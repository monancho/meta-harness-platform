# Meta Harness KO Autopilot — project-scoped Codex hints.
# 인증/프로바이더/토큰은 이 레포에 저장하지 마세요.

[project]
name = "meta-harness-platform-ko-autopilot"

[profiles.safe]
approval_policy = "never"
sandbox_mode = "workspace-write"

[profiles.review]
approval_policy = "on-request"
sandbox_mode = "workspace-write"

[profiles.yolo]
# 실제 실행은 scripts/agent/run-codex-current-task.sh --mode yolo 에서 명시적으로만 사용합니다.
# Dev Container를 버릴 수 있다는 전제에서만 사용하세요.
approval_policy = "never"
sandbox_mode = "danger-full-access"
